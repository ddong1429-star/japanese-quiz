<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>일본어 단어 랜덤 퀴즈</title>
<style>

*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans KR","Noto Sans JP",sans-serif}
.topbar{height:60px;background:#050505;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.title{font-weight:800}.sub{font-size:11px;color:#b9bec8;margin-top:2px}
.topbtn{border:0;border-radius:999px;background:#fff;padding:9px 14px;font-weight:700;cursor:pointer}

.toolbar{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:14px}

<body>
<header class="topbar"><div><div class="title">일본어 단어 랜덤 퀴즈</div><div class="sub">100개 단위 파트 분할 · 한자 뜻 표시</div></div><button class="topbtn" id="openEditor">단어 편집</button></header>
<main><section class="wrap">
<h1>일본어 단어 랜덤 퀴즈</h1>
<div class="toolbar"><strong>학습 범위</strong><select id="partSelect"></select><span id="partInfo"></span></div>
<div class="meta"><span id="progress"></span><span>Space: 정답 / Enter: 다음 / S: 섞기 / R: 앞뒤 / D: 다크</span></div>
<div class="card" id="card"><div class="word" id="question"></div><div class="answer hidden" id="answer"></div></div>
<div class="controls">
<button class="primary" id="showAnswer">정답 보기</button><button id="nextBtn">다음</button><button class="darkbtn" id="shuffleBtn">섞기</button><button id="favBtn">☆ 즐겨찾기</button>

<label class="toggle"><input type="checkbox" id="autoPlay"> 자동 진행</label><select id="delay"><option value="2000">2초</option><option value="3000" selected>3초</option><option value="5000">5초</option></select>
</div>
<div class="history-head"><span>이전 단어 (최근 0 / 20)</span><button id="clearHistory" style="padding:4px 9px">비우기</button></div><div class="history" id="history">아직 히스토리가 없어. ‘다음’을 눌러 진행해 봐.</div>
</section></main>
<div class="editor" id="editor"><div class="panel"><h2 style="margin:0">단어 편집</h2><div class="hint">한 줄에 하나씩: 일본어 | 히라가나 | 정답 표시문<br>예: 今週 | こんしゅう | 콘슈우 (이번 주)[이제 금/돌 주]</div><textarea id="wordInput"></textarea><div class="panel-actions"><button id="closeEditor">취소</button><button class="primary" id="saveWords">저장</button></div></div></div>

const STORAGE_KEY="jpQuizWords_kanji_v2";
let words=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||defaultWords;
let favorites=new Set(JSON.parse(localStorage.getItem("jpQuizFavs_kanji_v2")||"[]"));
let deck=[],index=0,shown=false,history=[],timer=null;const $=id=>document.getElementById(id);
function buildPartOptions(){const s=$("partSelect"),cur=s.value||"all",parts=Math.ceil(words.length/100);s.innerHTML=`<option value="all">전체 (${words.length}개)</option>`;for(let i=0;i<parts;i++){const a=i*100+1,b=Math.min((i+1)*100,words.length);s.insertAdjacentHTML("beforeend",`<option value="${i}">파트 ${i+1} (${a}~${b})</option>`)}if([...s.options].some(o=>o.value===cur))s.value=cur}
function selectedBase(){const v=$("partSelect").value;if(v==="all")return [...words];const i=Number(v);return words.slice(i*100,(i+1)*100)}
function activeWords(){let a=selectedBase();if($("favOnly").checked)a=a.filter(w=>favorites.has(w[0]));return a}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rebuild(x=true){deck=activeWords();if(x)shuffle(deck);index=0;shown=false;render()}function current(){return deck[index]||null}
function koreanMeaning(answerText){const m=answerText.match(/\((.*?)\)/);return m?m[1]:answerText}
function render(){clearTimeout(timer);const w=current();$("partInfo").textContent=`현재 범위 ${selectedBase().length}개`;if(!w){$("question").textContent="단어 없음";$("answer").textContent="이 범위에 표시할 단어가 없어.";$("answer").classList.remove("hidden");$("progress").textContent=`0 / 0　★${favorites.size}`;return}const rev=$("reverse").checked;$("question").textContent=rev?koreanMeaning(w[2]):w[0];$("answer").textContent=rev?`${w[0]}（${w[1]}） · ${w[2]}`:w[2];$("answer").classList.toggle("hidden",!shown);$("showAnswer").textContent=shown?"정답 숨기기":"정답 보기";$("favBtn").textContent=favorites.has(w[0])?"★ 즐겨찾기":"☆ 즐겨찾기";$("favBtn").classList.toggle("active",favorites.has(w[0]));$("progress").textContent=`${index+1} / ${deck.length}　★${favorites.size}`;updateHistory();if($("autoPlay").checked&&shown)timer=setTimeout(nextWord,Number($("delay").value))}
function toggleAnswer(){shown=!shown;render()}function nextWord(){const w=current();if(w){history.unshift(w[0]);history=history.slice(0,20)}index=deck.length?(index+1)%deck.length:0;shown=false;render()}
function updateHistory(){document.querySelector(".history-head span").textContent=`이전 단어 (최근 ${history.length} / 20)`;$("history").innerHTML=history.length?history.map(x=>`<span class="chip">${x}</span>`).join(""):"아직 히스토리가 없어. ‘다음’을 눌러 진행해 봐."}
function toggleFavorite(){const w=current();if(!w)return;favorites.has(w[0])?favorites.delete(w[0]):favorites.add(w[0]);localStorage.setItem("jpQuizFavs_kanji_v2",JSON.stringify([...favorites]));$("favOnly").checked?rebuild(false):render()}
function applyDark(on){document.body.classList.toggle("dark",on);localStorage.setItem("jpQuizDark_kanji_v2",on?"1":"0")}
function openEditor(){$("wordInput").value=words.map(w=>w.join(" | ")).join("\n");$("editor").classList.add("open")}
function saveWords(){const p=$("wordInput").value.split("\n").map(x=>x.trim()).filter(Boolean).map(x=>x.split("|").map(y=>y.trim())).filter(x=>x.length>=3&&x[0]&&x[1]&&x[2]).map(x=>[x[0],x[1],x.slice(2).join(" | ")]);if(!p.length){alert("올바른 단어가 없어.");return}words=p;localStorage.setItem(STORAGE_KEY,JSON.stringify(words));buildPartOptions();$("editor").classList.remove("open");rebuild(true)}
$("showAnswer").onclick=toggleAnswer;$("card").onclick=toggleAnswer;$("nextBtn").onclick=nextWord;$("shuffleBtn").onclick=()=>rebuild(true);$("favBtn").onclick=toggleFavorite;$("favOnly").onchange=()=>rebuild(true);$("reverse").onchange=()=>{shown=false;render()};$("partSelect").onchange=()=>rebuild(true);$("darkMode").onchange=e=>applyDark(e.target.checked);$("autoPlay").onchange=render;$("delay").onchange=render;$("clearHistory").onclick=()=>{history=[];updateHistory()};$("openEditor").onclick=openEditor;$("closeEditor").onclick=()=>$("editor").classList.remove("open");$("saveWords").onclick=saveWords;$("editor").onclick=e=>{if(e.target===$("editor"))$("editor").classList.remove("open")};
document.addEventListener("keydown",e=>{if($("editor").classList.contains("open"))return;if(e.code==="Space"){e.preventDefault();toggleAnswer()}else if(e.key==="Enter")nextWord();else if(e.key.toLowerCase()==="s")rebuild(true);else if(e.key.toLowerCase()==="r"){$("reverse").checked=!$("reverse").checked;shown=false;render()}else if(e.key.toLowerCase()==="d"){$("darkMode").checked=!$("darkMode").checked;applyDark($("darkMode").checked)}});
const ds=localStorage.getItem("jpQuizDark_kanji_v2")==="1";$("darkMode").checked=ds;applyDark(ds);buildPartOptions();rebuild(true);
</script></body></html>
